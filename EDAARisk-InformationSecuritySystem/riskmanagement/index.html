<title>EDAA Risk & Information Security System — Demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
  :root{
    --teal:#0E5C63; --teal-600:#0B4B51; --teal-700:#083A3F; --teal-050:#E7F1F1;
    --maroon:#7A1730; --navy:#0B2027;
    --bg:#EEF2F3; --surface:#FFFFFF; --surface-2:#F6F9F9; --surface-3:#EDF3F3;
    --line:#DBE4E4; --line-strong:#C4D2D2;
    --ink:#0E2226; --ink-2:#3C5257; --ink-3:#6C8085; --ink-inv:#F4F9F9;
    --low:#2E7D5B; --low-bg:#E5F2EB;
    --med:#B7841A; --med-bg:#FaF1DC;
    --high:#D9761F; --high-bg:#FBEBDD;
    --crit:#C0392B; --crit-bg:#FBE7E4;
    --good:#2E7D5B; --warn:#B7841A; --danger:#C0392B; --info:#3B6EA5;
    --radius:10px; --radius-sm:7px; --radius-lg:16px;
    --shadow:0 1px 2px rgba(11,32,39,.06),0 4px 16px rgba(11,32,39,.06);
    --shadow-lg:0 12px 40px rgba(11,32,39,.20);
    --rail:264px; --topbar:60px;
    --ff:"Segoe UI",system-ui,-apple-system,"Helvetica Neue",Arial,"Noto Sans Arabic","Geeza Pro",sans-serif;
    --mono:"Cascadia Code",ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#0A1417; --surface:#0F1E22; --surface-2:#122529; --surface-3:#162D32;
      --line:#22383D; --line-strong:#2E484E;
      --ink:#E7F2F2; --ink-2:#AFC4C6; --ink-3:#7C9599; --ink-inv:#F4F9F9;
      --teal-050:#123138;
      --low-bg:#12291F; --med-bg:#2A2410; --high-bg:#2E2113; --crit-bg:#301613;
      --shadow:0 1px 2px rgba(0,0,0,.4),0 6px 20px rgba(0,0,0,.35);
      --shadow-lg:0 16px 48px rgba(0,0,0,.6);
    }
  }
  :root[data-theme="dark"]{
    --bg:#0A1417; --surface:#0F1E22; --surface-2:#122529; --surface-3:#162D32;
    --line:#22383D; --line-strong:#2E484E;
    --ink:#E7F2F2; --ink-2:#AFC4C6; --ink-3:#7C9599; --ink-inv:#F4F9F9;
    --teal-050:#123138;
    --low-bg:#12291F; --med-bg:#2A2410; --high-bg:#2E2113; --crit-bg:#301613;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 6px 20px rgba(0,0,0,.35);
    --shadow-lg:0 16px 48px rgba(0,0,0,.6);
  }
  :root[data-theme="light"]{
    --bg:#EEF2F3; --surface:#FFFFFF; --surface-2:#F6F9F9; --surface-3:#EDF3F3;
    --line:#DBE4E4; --line-strong:#C4D2D2;
    --ink:#0E2226; --ink-2:#3C5257; --ink-3:#6C8085;
    --teal-050:#E7F1F1;
    --low-bg:#E5F2EB; --med-bg:#FAF1DC; --high-bg:#FBEBDD; --crit-bg:#FBE7E4;
    --shadow:0 1px 2px rgba(11,32,39,.06),0 4px 16px rgba(11,32,39,.06);
    --shadow-lg:0 12px 40px rgba(11,32,39,.20);
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:var(--ff);background:var(--bg);color:var(--ink);
    font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  [dir="rtl"] body{text-align:right}
  h1,h2,h3,h4{margin:0;text-wrap:balance;font-weight:650;letter-spacing:-.01em}
  button{font-family:inherit;cursor:pointer}
  a{color:var(--teal);text-decoration:none}
  .tnum{font-variant-numeric:tabular-nums}
  ::selection{background:var(--teal);color:#fff}
  :focus-visible{outline:2px solid var(--teal);outline-offset:2px;border-radius:4px}

  /* ---------- App shell ---------- */
  .app{min-height:100vh}
  .topbar{position:fixed;inset:0 0 auto 0;height:var(--topbar);z-index:60;
    display:flex;align-items:center;gap:14px;padding:0 16px;
    background:var(--surface);border-bottom:1px solid var(--line);box-shadow:var(--shadow)}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .brand .mark{width:34px;height:34px;flex:none;border-radius:9px;
    background:linear-gradient(150deg,var(--teal),var(--teal-700));
    display:grid;place-items:center;box-shadow:inset 0 0 0 1px rgba(255,255,255,.12)}
  .brand .txt{min-width:0}
  .brand .txt b{display:block;font-size:14px;line-height:1.1;letter-spacing:.02em}
  .brand .txt span{display:block;font-size:11px;color:var(--ink-3);line-height:1.3;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .demo-badge{font-size:9.5px;font-weight:800;letter-spacing:.12em;color:var(--maroon);
    border:1px solid color-mix(in srgb,var(--maroon) 40%,transparent);
    padding:2px 6px;border-radius:5px;background:color-mix(in srgb,var(--maroon) 8%,transparent)}
  .spacer{flex:1}
  .iconbtn{width:38px;height:38px;border-radius:9px;border:1px solid transparent;background:transparent;
    color:var(--ink-2);display:grid;place-items:center;position:relative}
  .iconbtn:hover{background:var(--surface-3);color:var(--ink)}
  .badge-dot{position:absolute;top:6px;right:6px;min-width:16px;height:16px;padding:0 4px;
    border-radius:9px;background:var(--maroon);color:#fff;font-size:10px;font-weight:700;
    display:grid;place-items:center;border:2px solid var(--surface)}
  [dir="rtl"] .badge-dot{right:auto;left:6px}
  .langtoggle{display:flex;border:1px solid var(--line-strong);border-radius:8px;overflow:hidden}
  .langtoggle button{border:0;background:transparent;color:var(--ink-2);font-size:12px;font-weight:600;
    padding:7px 11px}
  .langtoggle button.on{background:var(--teal);color:#fff}

  /* Persona switcher */
  .persona{display:flex;align-items:center;gap:10px;border:1px solid var(--line-strong);
    background:var(--surface);border-radius:10px;padding:5px 10px 5px 6px;max-width:250px}
  .persona:hover{border-color:var(--teal)}
  .avatar{width:30px;height:30px;flex:none;border-radius:50%;display:grid;place-items:center;
    font-size:12px;font-weight:700;color:#fff}
  .persona .pmeta{min-width:0;text-align:start;line-height:1.15}
  .persona .pmeta b{display:block;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .persona .pmeta span{display:block;font-size:10.5px;color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* dropdown */
  .menu{position:fixed;z-index:80;background:var(--surface);border:1px solid var(--line);
    border-radius:12px;box-shadow:var(--shadow-lg);padding:7px;min-width:288px;max-height:78vh;overflow:auto}
  .menu .mh{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);
    padding:8px 10px 5px}
  .menu .mi{display:flex;align-items:center;gap:11px;padding:8px 10px;border-radius:8px;width:100%;
    border:0;background:transparent;text-align:start;color:var(--ink)}
  .menu .mi:hover{background:var(--surface-3)}
  .menu .mi.sel{background:var(--teal-050)}
  .menu .mi .pmeta b{font-size:13px;display:block}
  .menu .mi .pmeta span{font-size:11px;color:var(--ink-3);display:block}

  /* Sidebar */
  .layout{display:flex;padding-top:var(--topbar)}
  .rail{position:fixed;top:var(--topbar);bottom:0;width:var(--rail);z-index:40;
    background:var(--surface);border-right:1px solid var(--line);
    display:flex;flex-direction:column;overflow-y:auto;transition:transform .22s ease}
  [dir="rtl"] .rail{border-right:0;border-left:1px solid var(--line)}
  .rail .who{padding:16px 18px 12px;border-bottom:1px solid var(--line)}
  .rail .who .role-chip{display:inline-flex;align-items:center;gap:6px;margin-top:8px;
    font-size:11px;font-weight:650;color:var(--teal);background:var(--teal-050);
    padding:4px 9px;border-radius:20px}
  .navgroup{padding:10px 12px 4px}
  .navgroup .gh{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);
    padding:6px 10px}
  .navitem{display:flex;align-items:center;gap:12px;width:100%;border:0;background:transparent;
    color:var(--ink-2);padding:9px 11px;border-radius:9px;font-size:13.5px;font-weight:550;
    text-align:start;position:relative}
  .navitem:hover{background:var(--surface-3);color:var(--ink)}
  .navitem.active{background:var(--teal-050);color:var(--teal);font-weight:650}
  .navitem.active::before{content:"";position:absolute;inset-inline-start:0;top:8px;bottom:8px;width:3px;
    border-radius:3px;background:var(--teal)}
  .navitem .ic{flex:none;color:currentColor;opacity:.85}
  .navitem .pill{margin-inline-start:auto;font-size:10.5px;font-weight:700;background:var(--maroon);
    color:#fff;border-radius:20px;min-width:19px;height:19px;padding:0 5px;display:grid;place-items:center}
  .rail .foot{margin-top:auto;padding:14px 18px;border-top:1px solid var(--line);
    font-size:11px;color:var(--ink-3)}
  .rail .foot .pt{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}
  .rail .foot .pt span{font-size:10px;background:var(--surface-3);border:1px solid var(--line);
    padding:3px 7px;border-radius:6px;color:var(--ink-2)}

  .scrim{position:fixed;inset:0;background:rgba(4,14,16,.45);z-index:35;opacity:0;pointer-events:none;
    transition:opacity .2s}
  .scrim.on{opacity:1;pointer-events:auto}

  /* Main */
  .main{flex:1;min-width:0;margin-inline-start:var(--rail);padding:22px 26px 60px}
  .page-head{display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:18px}
  .page-head .ph-txt h1{font-size:22px}
  .page-head .ph-txt p{margin:5px 0 0;color:var(--ink-2);font-size:13.5px;max-width:70ch}
  .page-head .ph-actions{margin-inline-start:auto;display:flex;gap:9px;flex-wrap:wrap}
  .eyebrow{font-size:11px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--maroon);
    margin-bottom:6px;display:flex;align-items:center;gap:8px}
  .modtag{font-size:10.5px;font-weight:700;color:var(--ink-3);background:var(--surface-3);
    border:1px solid var(--line);padding:2px 8px;border-radius:6px}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line-strong);
    background:var(--surface);color:var(--ink);padding:9px 15px;border-radius:9px;font-size:13px;
    font-weight:600;white-space:nowrap}
  .btn:hover{border-color:var(--teal);color:var(--teal)}
  .btn.primary{background:var(--teal);border-color:var(--teal);color:#fff}
  .btn.primary:hover{background:var(--teal-600);border-color:var(--teal-600);color:#fff}
  .btn.ghost{border-color:transparent;background:var(--surface-3)}
  .btn.sm{padding:6px 10px;font-size:12px}
  .btn.danger{color:var(--danger);border-color:color-mix(in srgb,var(--danger) 40%,transparent)}
  .btn.danger:hover{background:var(--crit-bg)}

  /* Cards & grids */
  .grid{display:grid;gap:16px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow)}
  .card .ch{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line)}
  .card .ch h3{font-size:14.5px}
  .card .ch .sub{font-size:12px;color:var(--ink-3)}
  .card .cb{padding:16px}
  .card .ch .ch-act{margin-inline-start:auto;display:flex;gap:8px}

  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;
    box-shadow:var(--shadow);position:relative;overflow:hidden}
  .kpi .kt{font-size:12px;color:var(--ink-3);font-weight:600;display:flex;align-items:center;gap:7px}
  .kpi .kv{font-size:30px;font-weight:700;margin-top:8px;letter-spacing:-.02em}
  .kpi .kd{font-size:11.5px;margin-top:5px;color:var(--ink-2);display:flex;align-items:center;gap:6px}
  .kpi .spark{position:absolute;inset-inline-end:14px;top:16px;opacity:.9}
  .kpi.accent::after{content:"";position:absolute;inset-block:0;inset-inline-start:0;width:4px;background:var(--teal)}
  .trend-up{color:var(--danger);font-weight:700}
  .trend-down{color:var(--good);font-weight:700}

  /* Tables */
  .tablewrap{overflow-x:auto;border-radius:var(--radius)}
  table.data{width:100%;border-collapse:collapse;font-size:13px;min-width:640px}
  table.data th{position:sticky;top:0;background:var(--surface-2);text-align:start;font-weight:650;
    font-size:11.5px;letter-spacing:.02em;color:var(--ink-2);padding:10px 12px;border-bottom:1px solid var(--line);
    white-space:nowrap}
  table.data td{padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
  table.data tr:hover td{background:var(--surface-2)}
  table.data tr:last-child td{border-bottom:0}
  .ref{font-family:var(--mono);font-size:12px;color:var(--teal);font-weight:600;white-space:nowrap}
  .rowlink{cursor:pointer}
  .muted{color:var(--ink-3)}
  .tc{white-space:nowrap}

  /* pills & bands */
  .pill-band{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;
    padding:3px 9px;border-radius:20px;white-space:nowrap}
  .pill-band::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor}
  .b-Low{color:var(--low);background:var(--low-bg)}
  .b-Medium{color:var(--med);background:var(--med-bg)}
  .b-High{color:var(--high);background:var(--high-bg)}
  .b-Critical{color:var(--crit);background:var(--crit-bg)}
  .status{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:650;
    padding:3px 9px;border-radius:6px;border:1px solid var(--line-strong);color:var(--ink-2);background:var(--surface-2)}
  .status.s-open,.status.s-Submitted{color:var(--info);border-color:color-mix(in srgb,var(--info) 40%,transparent);background:color-mix(in srgb,var(--info) 8%,transparent)}
  .status.s-review{color:var(--warn);border-color:color-mix(in srgb,var(--warn) 40%,transparent);background:var(--med-bg)}
  .status.s-accepted,.status.s-treatment{color:var(--teal);border-color:color-mix(in srgb,var(--teal) 40%,transparent);background:var(--teal-050)}
  .status.s-closed{color:var(--ink-3)}
  .score-chip{font-weight:700;font-variant-numeric:tabular-nums;padding:2px 8px;border-radius:6px;font-size:12px}

  /* charts */
  .chart-legend{display:flex;flex-wrap:wrap;gap:10px 16px;margin-top:12px;font-size:12px;color:var(--ink-2)}
  .chart-legend .lg{display:inline-flex;align-items:center;gap:7px}
  .chart-legend .sw{width:11px;height:11px;border-radius:3px}
  .heat{border-collapse:separate;border-spacing:4px}
  .heat td,.heat th{text-align:center;font-size:11.5px}
  .heat .cell{width:52px;height:44px;border-radius:8px;display:grid;place-items:center;font-weight:700;
    color:#fff;font-variant-numeric:tabular-nums;position:relative;cursor:default;font-size:14px}
  .heat .cell.empty{background:var(--surface-3);color:var(--ink-3);box-shadow:inset 0 0 0 1px var(--line)}
  .heat .axl{font-size:11px;color:var(--ink-3);font-weight:600}
  .axis-title{font-size:11px;color:var(--ink-3);font-weight:700;letter-spacing:.03em;text-transform:uppercase}

  .barlist{display:flex;flex-direction:column;gap:11px}
  .barrow{display:grid;grid-template-columns:150px 1fr 42px;align-items:center;gap:12px;font-size:12.5px}
  .barrow .lbl{color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bartrack{height:16px;background:var(--surface-3);border-radius:6px;overflow:hidden;display:flex}
  .barseg{height:100%}
  .barrow .val{text-align:end;font-weight:700;font-variant-numeric:tabular-nums;color:var(--ink)}

  .donutwrap{display:flex;align-items:center;gap:24px;flex-wrap:wrap}

  /* slide-over */
  .panel-scrim{position:fixed;inset:0;background:rgba(4,14,16,.5);z-index:90;opacity:0;pointer-events:none;
    transition:opacity .2s}
  .panel-scrim.on{opacity:1;pointer-events:auto}
  .panel{position:fixed;top:0;bottom:0;inset-inline-end:0;width:min(560px,100%);background:var(--surface);
    z-index:95;box-shadow:var(--shadow-lg);transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);
    display:flex;flex-direction:column}
  [dir="rtl"] .panel{transform:translateX(-100%)}
  .panel.on{transform:translateX(0)}
  .panel .pnh{display:flex;align-items:flex-start;gap:12px;padding:18px 20px;border-bottom:1px solid var(--line)}
  .panel .pnh h3{font-size:16px}
  .panel .pnh .sub{font-size:12px;color:var(--ink-3);margin-top:3px}
  .panel .pnb{padding:20px;overflow-y:auto;flex:1}
  .panel .pnf{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;
    background:var(--surface-2)}

  /* forms */
  .field{margin-bottom:15px}
  .field>label{display:block;font-size:12.5px;font-weight:650;margin-bottom:6px;color:var(--ink)}
  .field .req{color:var(--maroon)}
  .field .hint{font-size:11.5px;color:var(--ink-3);margin-top:5px}
  .inp,.sel,textarea.inp{width:100%;border:1px solid var(--line-strong);background:var(--surface);
    color:var(--ink);border-radius:9px;padding:10px 12px;font-size:13.5px;font-family:inherit}
  .inp:focus,.sel:focus,textarea.inp:focus{outline:none;border-color:var(--teal);
    box-shadow:0 0 0 3px var(--teal-050)}
  textarea.inp{resize:vertical;min-height:82px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .scorebox{display:flex;align-items:center;gap:14px;padding:14px;border:1px dashed var(--line-strong);
    border-radius:10px;background:var(--surface-2)}
  .scorebox .sc-num{font-size:30px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
  .scorebox .sc-meta{font-size:12px;color:var(--ink-2)}
  .filedrop{border:1.5px dashed var(--line-strong);border-radius:10px;padding:16px;text-align:center;
    color:var(--ink-3);font-size:12.5px;background:var(--surface-2)}

  .segrow{display:flex;gap:0;border:1px solid var(--line-strong);border-radius:9px;overflow:hidden;flex-wrap:wrap}
  .segrow button{flex:1;border:0;background:var(--surface);color:var(--ink-2);padding:9px 6px;font-size:12px;
    font-weight:600;border-inline-start:1px solid var(--line)}
  .segrow button:first-child{border-inline-start:0}
  .segrow button.on{background:var(--teal);color:#fff}

  /* toast */
  .toasts{position:fixed;inset-block-end:20px;inset-inline-end:20px;z-index:120;display:flex;flex-direction:column;
    gap:10px;max-width:380px}
  .toast{background:var(--surface);border:1px solid var(--line);border-inline-start:4px solid var(--teal);
    border-radius:10px;box-shadow:var(--shadow-lg);padding:12px 14px;display:flex;gap:11px;align-items:flex-start;
    animation:slidein .28s cubic-bezier(.4,0,.2,1)}
  .toast.crit{border-inline-start-color:var(--danger)}
  .toast.ok{border-inline-start-color:var(--good)}
  .toast .ti{flex:none;margin-top:1px}
  .toast .tt b{font-size:12.5px;display:block}
  .toast .tt .flowid{font-family:var(--mono);font-size:10.5px;color:var(--maroon);font-weight:700}
  .toast .tt p{margin:3px 0 0;font-size:12px;color:var(--ink-2)}
  @keyframes slidein{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
  [dir="rtl"] @keyframes slidein{from{transform:translateX(-20px);opacity:0}}

  /* ================= RISK DETAILS — BUSINESS PROCESS FLOW ================= */
  .btn[disabled]{opacity:.4;pointer-events:none;cursor:not-allowed}
  .rd-header .ph-txt p{color:var(--ink-3)}
  .rd-header .eyebrow .ref{font-size:11px}
  .rd-header .eyebrow .status{margin-inline-start:2px}

  .bpf{display:flex;align-items:flex-start;gap:0;overflow-x:auto;padding:6px 2px 2px}
  .bpf-stage{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;min-width:96px;
    position:relative;padding:4px 6px;border-radius:10px;transition:background .18s}
  .bpf-stage[data-act]{cursor:pointer}
  .bpf-stage[data-act]:hover{background:var(--surface-2)}
  .bpf-stage[data-act]:hover .bpf-node{transform:translateY(-2px)}
  .bpf-node{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;flex:none;
    transition:transform .18s,box-shadow .18s,background .18s,color .18s;background:var(--surface-3);color:var(--ink-3)}
  .bpf-label{font-size:12px;font-weight:650;color:var(--ink-3);text-align:center;white-space:nowrap}
  .bpf-stage.done .bpf-node{background:var(--good);color:#fff}
  .bpf-stage.done .bpf-label{color:var(--ink-2)}

/* ================= CHARTS (inline SVG) ================= */
function donutChart(data,centerTop,centerBot){
  const total=data.reduce((s,d)=>s+d.value,0)||1;
  const r=54,c=2*Math.PI*r;let off=0;
  const segs=data.filter(d=>d.value>0).map(d=>{
    const frac=d.value/total,len=frac*c;
    const s=`<circle cx="70" cy="70" r="${r}" fill="none" stroke="${d.color}" stroke-width="22"
      stroke-dasharray="${len} ${c-len}" stroke-dashoffset="${-off}" transform="rotate(-90 70 70)"
      stroke-linecap="butt"><title>${d.label}: ${d.value}</title></circle>`;
    off+=len;return s;}).join('');
  const legend=data.map(d=>`<span class="lg"><span class="sw" style="background:${d.color}"></span>${d.label} <b class="tnum" style="margin-inline-start:4px">${d.value}</b></span>`).join('');
  return `<div class="donutwrap"><svg width="140" height="140" viewBox="0 0 140 140" role="img" aria-label="Donut chart">
    <circle cx="70" cy="70" r="54" fill="none" stroke="var(--surface-3)" stroke-width="22"/>${segs}
    <text x="70" y="65" text-anchor="middle" font-size="30" font-weight="800" fill="var(--ink)">${centerTop}</text>
    <text x="70" y="86" text-anchor="middle" font-size="10.5" fill="var(--ink-3)" font-weight="600">${centerBot||''}</text>
  </svg><div class="chart-legend" style="flex-direction:column;gap:8px">${legend}</div></div>`;
}
function barList(data,unit){
  const max=Math.max(1,...data.map(d=>d.value));
  return `<div class="barlist">`+data.map(d=>{
    const w=Math.max(2,Math.round(d.value/max*100));
    const color=d.color||'var(--teal)';
    return `<div class="barrow"><span class="lbl" title="${d.label}">${d.label}</span>
      <div class="bartrack"><div class="barseg" style="width:${w}%;background:${color};border-radius:6px"></div></div>
      <span class="val tnum">${d.value}${unit||''}</span></div>`;
  }).join('')+`</div>`;
}
function stackBarList(rows){ // rows:[{label, segs:[{value,color,band}]}]
  const totals=rows.map(r=>r.segs.reduce((s,x)=>s+x.value,0));
  const max=Math.max(1,...totals);
  return `<div class="barlist">`+rows.map((r,idx)=>{
    const tot=totals[idx];const wtot=Math.max(2,Math.round(tot/max*100));
    const segs=r.segs.filter(s=>s.value>0).map(s=>`<div class="barseg" style="width:${Math.round(s.value/tot*100)}%;background:${s.color};box-shadow:1px 0 0 var(--surface)"><title>${s.value}</title></div>`).join('');
    return `<div class="barrow"><span class="lbl" title="${r.label}">${r.label}</span>
      <div class="bartrack" style="width:${wtot}%">${segs}</div><span class="val tnum">${tot}</span></div>`;
  }).join('')+`</div>`;
}
function bandLegend(){
  return `<div class="chart-legend">`+BANDS.map(b=>`<span class="lg"><span class="sw" style="background:${b.color}"></span>${bandName(b.id)}</span>`).join('')+`</div>`;
}
function heatmap(records){
  // grid[impact][likelihood]
  const grid={};for(let i=1;i<=5;i++){grid[i]={};for(let l=1;l<=5;l++)grid[i][l]=0;}
  records.forEach(r=>{if(r.l&&r.i)grid[r.i][r.l]++;});
  let rows='';
  for(let i=5;i>=1;i--){
    let tds=`<td class="axl">${state.lang==='ar'?IMPACT[i-1].ar:IMPACT[i-1].en}<br><b class="tnum">${i}</b></td>`;
    for(let l=1;l<=5;l++){
      const score=i*l,band=bandOf(score),n=grid[i][l];
      const bg=n>0?bandColor(band):'';
      tds+=`<td>${n>0
        ? `<div class="cell" style="background:${bg}" title="L${l}×I${i}=${score} · ${bandName(band)} · ${n}">${n}</div>`
        : `<div class="cell empty" title="L${l}×I${i}=${score}">·</div>`}</td>`;
    }
    rows+=`<tr>${tds}</tr>`;
  }
  let head=`<tr><th></th>`;for(let l=1;l<=5;l++)head+=`<th class="axl">${state.lang==='ar'?SCALE[l-1].ar:SCALE[l-1].en}<br><b class="tnum">${l}</b></th>`;head+='</tr>';
  return `<div style="display:flex;gap:10px;align-items:center">
    <div class="axis-title" style="writing-mode:vertical-rl;transform:rotate(180deg);text-align:center">${tt('impact')} →</div>
    <div style="overflow-x:auto"><table class="heat">${head}${rows}</table>
      <div class="axis-title" style="text-align:center;margin-top:8px">${tt('likelihood')} →</div></div>
    </div>${bandLegend()}`;
}
function lineChart(data){
  const W=340,H=130,pad=24;const max=Math.max(...data.map(d=>d.v))*1.15;
  const x=i=>pad+i*((W-pad*2)/(data.length-1));
  const y=v=>H-pad-(v/max)*(H-pad*2);
  const pts=data.map((d,i)=>`${x(i)},${y(d.v)}`).join(' ');
  const area=`${x(0)},${H-pad} ${pts} ${x(data.length-1)},${H-pad}`;
  const dots=data.map((d,i)=>`<circle cx="${x(i)}" cy="${y(d.v)}" r="${i===data.length-1?4:2.8}" fill="var(--teal)" stroke="var(--surface)" stroke-width="1.5"/>`).join('');
  const labels=data.map((d,i)=>`<text x="${x(i)}" y="${H-7}" text-anchor="middle" font-size="9.5" fill="var(--ink-3)">${d.m}</text>`).join('');
  const grid=[0,.5,1].map(f=>`<line x1="${pad}" x2="${W-pad}" y1="${pad+f*(H-pad*2)}" y2="${pad+f*(H-pad*2)}" stroke="var(--line)" stroke-width="1"/>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" role="img" aria-label="Trend line" style="max-width:420px">
    <defs><linearGradient id="tg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--teal)" stop-opacity="0.22"/><stop offset="1" stop-color="var(--teal)" stop-opacity="0"/></linearGradient></defs>
    ${grid}<polygon points="${area}" fill="url(#tg)"/>
    <polyline points="${pts}" fill="none" stroke="var(--teal)" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}${labels}
    <text x="${x(data.length-1)}" y="${y(data[data.length-1].v)-9}" text-anchor="middle" font-size="11" font-weight="800" fill="var(--teal)">${data[data.length-1].v}</text>
  </svg>`;
}

function combinedRegister(){return L04.concat(L05);}
function countByBand(recs){const o={Low:0,Medium:0,High:0,Critical:0};recs.forEach(r=>{if(r.band)o[r.band]++;});return o;}
function opStats(recs){
  const open=recs.filter(r=>r.status!=='Closed').length;
  const ch=recs.filter(r=>r.band==='Critical'||r.band==='High').length;
  const closed=recs.filter(r=>r.status==='Closed'||r.status==='Monitoring').length;
  const overdue=recs.filter(r=>r.due&&r.status!=='Closed'&&daysUntil(r.due)<0).length;
  return {total:recs.length,open,ch,closed,overdue};
}
function bandDonut(recs){const b=countByBand(recs);return donutChart(BANDS.map(x=>({label:bandName(x.id),value:b[x.id],color:x.color})),recs.length,tt('totalRisks'));}
function deptStack(recs){
  return stackBarList(DEPTS.filter(d=>recs.some(r=>r.dept===d.id)).map(d=>{
    const rs=recs.filter(r=>r.dept===d.id);
    return {label:deptName(d.id),segs:BANDS.map(b=>({value:rs.filter(r=>r.band===b.id).length,color:b.color}))};
  }));
}
function catBars(recs){
  return barList(CATS.filter(c=>recs.some(r=>r.cat===c.id)).map(c=>({label:catName(c.id),value:recs.filter(r=>r.cat===c.id).length,color:'var(--teal)'})).sort((a,b)=>b.value-a.value));
}
function topRisks(recs){
  return recs.slice().sort((a,b)=>b.score-a.score).slice(0,6).map(r=>
    `<div style="display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--line)">
      <span class="ref">${r.ref}</span>
      <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${state.lang==='ar'&&r.ar?r.ar:r.desc}</span>
      ${bandPill(r.band)}${scoreChip(r.score,r.band)}</div>`).join('');
}

function dashAgingView(){
  const rs=combinedRegister();
  const overdue=rs.filter(r=>r.due&&r.status!=='Closed'&&daysUntil(r.due)<0).sort((a,b)=>daysUntil(a.due)-daysUntil(b.due));
  const buckets=[['0–30 days',0],['31–60 days',0],['61–90 days',0],['90+ days',0]];
  rs.forEach(r=>{const d=daysSince(r.date);const idx=d<=30?0:d<=60?1:d<=90?2:3;buckets[idx][1]++;});
  const overdueRows=overdue.length?overdue.map(r=>`<tr><td><span class="ref">${r.ref}</span></td>
    <td>${state.lang==='ar'&&r.ar?r.ar:r.desc}</td><td class="tc">${r.owner}</td>

    <td>${statusPill(r.status)}</td></tr>`).join(''):`<tr><td colspan="6">${emptyState('No overdue mitigations')}</td></tr>`;
  return pageHead({mod:'Module 6 · DSH-04',eyebrow:'Risk Aging',title:tt('nav_dashAging'),
    desc:'Time-in-status analysis highlighting overdue mitigations and stale records.',
    actions:`<button class="btn primary" data-act="run-scan">${ic('clock')} ${tt('runScan')}</button>`})+
    kpiRow([{t:tt('overdueMit'),v:overdue.length,icon:'clock',danger:overdue.length>0},{t:'Avg. age (days)',v:Math.round(rs.reduce((s,r)=>s+daysSince(r.date),0)/rs.length),icon:'trend'},{t:'Records > 90 days',v:buckets[3][1],icon:'doc'},{t:'In treatment',v:rs.filter(r=>r.status==='In Treatment').length,icon:'register'}])+

function recalcScore(){
  const lE=document.getElementById('f_l'),iE=document.getElementById('f_i');if(!lE)return;
  const l=+lE.value,i=+iE.value,s=l*i,b=bandOf(s);
  const n=document.getElementById('scNum');if(n)n.textContent=s;
  const bd=document.getElementById('scBand');if(bd)bd.innerHTML=bandPill(b);
  const m=document.getElementById('scMeta');if(m)m.textContent=`${tt('likelihood')} ${l} × ${tt('impact')} ${i}`;

/* ================= RISK DETAILS PAGE — DATA HELPERS ================= */
function riskKey(m,ref){return m+':'+ref;}
function hashStr(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return h;}
function shiftDate(d,days){const dt=new Date(d);dt.setDate(dt.getDate()+days);return fmtDate(dt);}
function buFor(r,module){return module==='ent'?'Board & Executive Committee':(BU_BY_DEPT[r.dept]||deptName(r.dept));}
function objFor(r,module){return module==='ent'?r.obj:(OBJ_BY_CAT[r.cat]||catName(r.cat));}
function riskSourceFor(r){return RISK_SOURCES[hashStr(r.ref)%RISK_SOURCES.length];}
function reporterFor(r,module){
  if(module==='ent')return 'Fatima Al-Emadi';
  const cands=PERSONAS.filter(p=>p.dept===r.dept&&p.name!==r.owner);
  return cands.length?cands[hashStr(r.ref)%cands.length].name:r.owner;
}
function budgetFor(r){return (r.score*4500).toLocaleString()+' QAR';}
function residualScoreOf(r,stageId){
  if(r.rscore)return {score:r.rscore,band:r.rband};
  const idx=STAGE_ORDER.indexOf(stageId);
  const factor=[1,0.9,0.7,0.55,0.4][idx];
  const sc=Math.max(1,Math.round(r.score*factor));
  return {score:sc,band:bandOf(sc)};
}
function expectedReductionPct(r,stageId){
  const res=residualScoreOf(r,stageId);
  return Math.max(0,Math.round((1-(res.score/r.score))*100));
}
function controlEffectivenessFor(r,stageId){
  const res=residualScoreOf(r,stageId);const ratio=res.score/r.score;
  if(ratio<=0.5)return 'effective'; if(ratio<=0.75)return 'partiallyEffective'; return 'needsImprovement';
}
function reviewScheduleFor(r){return (r.band==='Critical'||r.band==='High')?'monthly':'quarterly';}
function riskTrendFor(r){
  if(r.rl!=null&&r.ri!=null){ if(r.rl<r.l||r.ri<r.i)return 'decreasing'; if(r.rl===r.l&&r.ri===r.i)return 'stable'; return 'increasing'; }
  return 'decreasing';
}
function linkifyMentions(text){return (text||'').replace(/@([A-Za-z]+)/g,'<span class="mention">@$1</span>');}
const ATTACH_BY_STAGE={identify:'Initial_Risk_Report.pdf',assess:'Risk_Assessment_Matrix.xlsx',
  mitigate:'Mitigation_Action_Plan.docx',monitor:'Monitoring_Dashboard_Export.pdf',close:'Closure_Report.pdf'};
function attachmentsFor(r,stageId){
  const idx=STAGE_ORDER.indexOf(stageId);
  return STAGE_ORDER.slice(0,idx+1).map((sid,i)=>({
    name:`${r.ref}_${ATTACH_BY_STAGE[sid]}`, size:(140+i*63+(hashStr(r.ref+sid)%40))+' KB',
    date:shiftDate(r.date,i*5+2), by:r.owner}));
}
function actionItemsFor(r,stageId,module){
  const doneN={identify:0,assess:0,mitigate:1,monitor:2,close:3}[stageId]||0;
  const rep=reporterFor(r,module);
  const templates=state.lang==='ar'?[
    `تنفيذ: ${r.mit}`,`التحقق من فعالية الضوابط لفئة ${catName(r.cat)}`,`إبلاغ ${r.owner} ورئيس الإدارة بوضع المخاطرة المتبقية`,
  ]:[
    `Implement: ${r.mit}`,`Validate control effectiveness for the ${catName(r.cat)} exposure`,
    `Brief ${r.owner} and department head on residual risk position`,
  ];
  return templates.map((t,i)=>({title:t,owner:i===1?r.owner:rep,due:shiftDate(r.due,(i-2)*6),
    status:i<doneN?'done':(i===doneN?'progress':'pending')}));
}
const MILESTONES=[
  {key:'created',stage:'identify',en:'Risk created',ar:'تم إنشاء المخاطرة'},
  {key:'assessed',stage:'assess',en:'Assessment completed',ar:'اكتمل التقييم'},
  {key:'assigned',stage:'mitigate',en:'Mitigation assigned',ar:'تم تعيين خطة المعالجة'},
  {key:'approved',stage:'mitigate',en:'Manager approved treatment plan',ar:'اعتماد خطة المعالجة من المدير'},
  {key:'residual',stage:'monitor',en:'Residual risk updated',ar:'تحديث المخاطر المتبقية'},
  {key:'monitoring',stage:'monitor',en:'Monitoring started',ar:'بدء المراقبة'},
  {key:'closed',stage:'close',en:'Risk formally closed',ar:'إغلاق المخاطرة رسمياً'},
];
function riskTimelineFor(r,stageId){
  const idx=STAGE_ORDER.indexOf(stageId);
  const reached=MILESTONES.filter(m=>STAGE_ORDER.indexOf(m.stage)<=idx);
  const upcoming=MILESTONES.filter(m=>STAGE_ORDER.indexOf(m.stage)===idx+1).slice(0,1);
  const out=reached.map((m,i)=>({...m,date:shiftDate(r.date,i*4+1),done:true}));
  upcoming.forEach(m=>out.push({...m,date:'—',done:false}));
  return out;
}
function ensureRiskExtras(module,ref,r){
  const key=riskKey(module,ref);
  if(!state.riskActivity[key]){
    const idx=STAGE_ORDER.indexOf(r.stage);
    const seed=[{who:reporterFor(r,module),action:{en:'Reported the risk',ar:'أبلغ عن المخاطرة'},date:r.date,icon:'alert'}];
    if(idx>=1)seed.push({who:r.owner,action:{en:'Completed the likelihood × impact assessment',ar:'أكمل تقييم الاحتمالية × الأثر'},date:shiftDate(r.date,3),icon:'filter'});
    if(idx>=2)seed.push({who:r.owner,action:{en:'Submitted the mitigation plan for approval',ar:'قدّم خطة المعالجة للاعتماد'},date:shiftDate(r.date,7),icon:'gear'});
    if(idx>=3)seed.push({who:'Fatima Al-Emadi',action:{en:'Moved the risk into monitoring',ar:'نقل المخاطرة إلى مرحلة المراقبة'},date:shiftDate(r.date,14),icon:'eye'});
    if(idx>=4)seed.push({who:'Fatima Al-Emadi',action:{en:'Approved final closure',ar:'اعتمد الإغلاق النهائي'},date:shiftDate(r.date,21),icon:'check'});
    state.riskActivity[key]=seed.reverse();
  }
  if(!state.riskComments[key]){
    state.riskComments[key]=[
      {who:r.owner,date:shiftDate(r.date,2),text:`Root cause confirmed as "${r.cause||catName(r.cat)}". Starting on the treatment plan.`},
      {who:'Fatima Al-Emadi',date:shiftDate(r.date,4),text:`Agreed — please loop in @${(reporterFor(r,module)||'').split(' ')[0]} once the plan is ready for review.`},
    ];
  }
}
function pushActivity(module,ref,action){
  const key=riskKey(module,ref);
  if(!state.riskActivity[key])state.riskActivity[key]=[];
  state.riskActivity[key].unshift({who:persona().name,action,date:fmtDate(TODAY),icon:'trend'});
}

      <h1>${title}</h1><p>${objFor(r,rd.module)}</p>
    </div>
    <div class="ph-actions">${actions.join('')}</div>
  </div>`;
}
function riskDetailAccessible(){
  const rd=state.riskDetail;if(!rd)return false;
  const list=rd.module==='ent'?L05:L04;const r=list.find(x=>x.ref===rd.ref);if(!r)return false;
  if(rd.module==='ent')return isRiskMgmt();
  return roleCan('oprisk')&&(isRiskMgmt()||r.dept===myDept());
}
function riskDetailView(){
  const rd=state.riskDetail;
  const list=rd.module==='ent'?L05:L04;
  const r=list.find(x=>x.ref===rd.ref);
  const key=riskKey(rd.module,rd.ref);
  const canEdit=rd.module==='ent'?isRiskMgmt():canEditOp();
  const interactive=state.presentationMode||canEdit;
  const stageId=rd.stage;
  return riskDetailHeader(r,rd,canEdit)
    +`<div class="card"><div class="cb">${processFlowHTML(stageId,interactive)}</div></div>`
    +progressSummaryHTML(r,rd,stageId)
    +`<div class="rd-grid" style="margin-top:16px">
        <div class="rd-main">
          ${riskSummaryCardHTML(r,rd)}
          ${stageDetailCardHTML(r,rd)}
          ${riskTimelineCardHTML(r,stageId)}
          ${activityFeedCardHTML(key)}
          ${attachmentsCardHTML(r,stageId)}
          ${commentsCardHTML(key)}
        </div>
        <div class="rd-side">${sidebarHTML(r,rd,stageId)}</div>
      </div>`;
}

/* ================= RISK DETAILS PAGE — ACTIONS ================= */
function navigateRiskDetail(module,ref){
  const list=module==='ent'?L05:L04;
  const r=list.find(x=>x.ref===ref);if(!r)return;
  ensureRiskExtras(module,ref,r);
  state.riskDetail={module,ref,stage:r.stage,lastUpdated:r.date};
  state.view='riskDetail';
  render();
}
function setRiskStage(newId){
  const rd=state.riskDetail;if(!rd)return;
  const list=rd.module==='ent'?L05:L04;
  const r=list.find(x=>x.ref===rd.ref);if(!r)return;
  const oldId=rd.stage;if(newId===oldId)return;
  const oldIdx=STAGE_ORDER.indexOf(oldId),newIdx=STAGE_ORDER.indexOf(newId);
  rd.stage=newId;r.stage=newId;r.status=STAGE_STATUS[newId];rd.lastUpdated=fmtDate(TODAY);
  const s0=STAGES.find(s=>s.id===oldId),s1=STAGES.find(s=>s.id===newId);
  pushActivity(rd.module,rd.ref,newIdx>oldIdx?
    {en:`Advanced from ${s0.en} to ${s1.en}`,ar:`تقدّم من ${s0.ar} إلى ${s1.ar}`}:
    {en:`Returned from ${s0.en} to ${s1.en}`,ar:`رجوع من ${s0.ar} إلى ${s1.ar}`});
  fireFlow('FLW-05','Risk stage updated','تحديث مرحلة المخاطرة',
    `${r.ref} successfully moved from ${s0.en} to ${s1.en}.`,
    `${r.ref} انتقلت بنجاح من ${s0.ar} إلى ${s1.ar}.`, newIdx>oldIdx?'ok':'info');
  render();
}
function stepStage(delta){
  const rd=state.riskDetail;if(!rd)return;
  const idx=STAGE_ORDER.indexOf(rd.stage);
  setRiskStage(STAGE_ORDER[Math.min(4,Math.max(0,idx+delta))]);
}
function jumpStage(id){setRiskStage(id);}
function togglePresentation(){state.presentationMode=!state.presentationMode;render();}
function postComment(key){
  const box=document.getElementById('commentBox');if(!box)return;
  const text=box.value.trim();if(!text)return;
  if(!state.riskComments[key])state.riskComments[key]=[];
  state.riskComments[key].push({who:persona().name,date:fmtDate(TODAY),text});
  render();
}

/* ================= ACTIONS ================= */
function advanceSubStatus(module,ref){
  const list=module==='incidents'?L02:L01;const r=list.find(x=>x.ref===ref);if(!r)return;
  const flow=['Submitted','Under Review','Accepted into Register','Closed'];
  const i=flow.indexOf(r.status);r.status=flow[Math.min(i+1,flow.length-1)];
  fireFlow('FLW-05','Status updated','تحديث الحالة',`${r.ref} → ${r.status}. Submitter ${r.byName} notified.`,`${r.ref} ← ${r.status}. تم إشعار المُرسِل.`,'ok');
  openSub(module,ref);render();
}
function advanceProjStatus(ref){const r=L03.find(x=>x.ref===ref);const flow=['Submitted','Under Review','Accepted into Register','Closed'];r.status=flow[Math.min(flow.indexOf(r.status)+1,3)];fireFlow('FLW-05','Assessment status updated','تحديث حالة التقييم',`${r.ref} → ${r.status}. Requester notified.`,`${r.ref} ← ${r.status}.`,'ok');openProjDetail(ref);render();}
function promoteToEnterprise(rec,srcType){
  const ref=`ENR-2026-${String(++SEQ.ENR).padStart(3,'0')}`;
  L05.unshift({ref,desc:rec.title||rec.desc,ar:rec.ar,cat:rec.cat,l:rec.l||3,i:rec.i||3,owner:persona().name,obj:'To be assigned',srcType,srcRef:rec.ref,mit:rec.mit||'Enterprise mitigation plan to be defined.',status:'Open',date:fmtDate(TODAY),due:shiftDate(TODAY,45),stage:'identify'});
  withScore(L05);
  fireFlow('ENR-02','Promoted to Enterprise Register','ترقية للسجل المؤسسي',`${rec.ref} promoted → ${ref}, source link preserved.`,`${rec.ref} ← ترقية إلى ${ref} مع حفظ الرابط.`,'ok');
  closePanel();state.view='entrisk';render();
}
function runDailyScan(){
  const overdue=combinedRegister().filter(r=>r.due&&r.status!=='Closed'&&daysUntil(r.due)<0);
  if(!overdue.length){fireFlow('FLW-04','Daily scan complete','اكتمل الفحص اليومي','No overdue mitigations found.','لا توجد معالجات متأخرة.','ok');return;}
  fireFlow('FLW-04','Overdue mitigation reminders sent','إرسال تذكيرات التأخر',`${overdue.length} reminder(s) sent to risk owners & representatives.`,`تم إرسال ${overdue.length} تذكير للمالكين والممثلين.`,'crit');
}

/* ================= MENUS ================= */
function openPersonaMenu(){
  closeFloating();
  const btn=document.getElementById('personaBtn').getBoundingClientRect();
  const m=document.createElement('div');m.className='menu';m.id='floatMenu';
  m.innerHTML=`<div class="mh">${tt('switchPersona')}</div>`+PERSONAS.map(p=>`<button class="mi ${p.id===state.personaId?'sel':''}" data-act="set-persona" data-id="${p.id}">
    <span class="avatar" style="background:${p.color}">${initials(p.name)}</span>
    <span class="pmeta"><b>${state.lang==='ar'?p.ar:p.name}</b><span>${ROLE_LABEL[p.role][state.lang]} · ${deptName(p.dept)}</span></span></button>`).join('');
  document.body.appendChild(m);
  m.style.top=(btn.bottom+8)+'px';
  if(state.lang==='ar'){m.style.left=btn.left+'px';}else{m.style.right=(window.innerWidth-btn.right)+'px';}
}
function openNotifMenu(){
  closeFloating();
  const btn=document.getElementById('notifBtn').getBoundingClientRect();
  const m=document.createElement('div');m.className='menu';m.id='floatMenu';m.style.minWidth='330px';
  const items=state.notifs.length?state.notifs.slice(0,12).map(n=>`<div style="display:flex;gap:11px;padding:9px 10px;border-bottom:1px solid var(--line)">
    <span style="color:${n.kind==='crit'?'var(--danger)':n.kind==='ok'?'var(--good)':'var(--teal)'};margin-top:1px">${n.kind==='crit'?ic('alert'):n.kind==='ok'?ic('check'):ic('flow')}</span>
    <div><span class="flowid" style="font-family:var(--mono);color:var(--maroon);font-weight:700;font-size:10.5px">${n.flowId}</span>
    <b style="display:block;font-size:12.5px">${n.title[state.lang]}</b><span class="muted" style="font-size:11.5px">${n.body[state.lang]}</span></div></div>`).join(''):`<div class="empty-state" style="padding:24px">${ic('bell')}<div>${state.lang==='ar'?'لا إشعارات بعد':'No notifications yet'}</div></div>`;
  m.innerHTML=`<div class="mh">${state.lang==='ar'?'الإشعارات — Power Automate':'Notifications — Power Automate'}</div>${items}`;
  document.body.appendChild(m);
  m.style.top=(btn.bottom+8)+'px';
  if(state.lang==='ar'){m.style.left='16px';}else{m.style.right='16px';}
}
function closeFloating(){const m=document.getElementById('floatMenu');if(m)m.remove();}

/* ================= PRESENTER GUIDE ================= */
function openPresenter(){
  const scenes=[
    ['emp','emerging','Noora Al-Kuwari','Employee','An employee submits an Emerging Risk',
     'Noora notices reconciliation runs are creeping past the settlement cut-off. She opens the app, taps <b>Report Emerging Risk</b>, fills the form — the risk score calculates live — and submits.',
     '“Any of our 200+ staff can raise a risk in under three minutes, no training needed. Watch the score compute as I pick likelihood and impact.”'],
    ['emp','incidents','Omar / Noora','Employee','Another employee reports an Incident',
     'A 47-minute feed outage is logged as an incident. Severity <b>Critical</b> incidents fire an immediate escalation to Risk Management.',
     '“Incidents are separate from risks but flow into the same governance. A Critical severity triggers FLW-03 the moment it’s saved.”'],
    ['pmo','project','Khalid Al-Mannai','PMO','The PMO submits a Project Risk Assessment request',
     'Khalid raises an assessment request for the CSD Platform Upgrade. This screen is hidden from everyone outside the PMO Entra ID group.',
     '“Notice this module simply isn’t in the navigation for other roles — that’s Entra ID group-based access, not a client-side trick.”'],
    ['rep','oprisk','Aisha Al-Sulaiti','Risk Representative','Risk Representatives manage Operational Risks',
     'Aisha maintains the IT department register. She only ever sees IT’s rows — item-level permissions are set automatically by FLW-02.',
     '“Switch me to the IT Risk Rep and the register shrinks to just IT. A Finance rep would see only Finance. Same app, data-scoped by identity.”'],
    ['rsk','entrisk','Fatima Al-Emadi','Risk Management','Risk Management promotes risks into the Enterprise Register',
     'Fatima triages submissions, then promotes the significant ones — a link back to the source record is preserved on every enterprise entry.',
     '“One click promotes an emerging risk or incident into the Enterprise Register, keeping full traceability to where it came from.”'],
    ['ceo','dashExec','Mohammed Al-Thani','CEO','Executives monitor risks through Power BI dashboards',
     'The CEO opens the Executive KPI dashboard: totals, open vs. closed, the likelihood×impact heatmap, top risks, and the trend line.',
     '“Leadership gets a single, always-current view. Department Heads see only their own department through row-level security.”'],
    ['rsk','flows','Power Automate','Automation','Power Automate sends notifications and reminders',
     'Throughout the journey, five flows handle notifications, permission assignment, escalation, and daily overdue reminders. Open the Flows screen and run the daily scan live.',
     '“Every notification you saw pop up was a real flow firing. Let me run the daily overdue scan — FLW-04 — right now.”'],
  ];
  openModal(`<div class="mh"><span style="width:34px;height:34px;border-radius:9px;background:var(--maroon);color:#fff;display:grid;place-items:center">${ic('play')}</span>
    <div style="flex:1"><h3 style="font-size:16px">Presenter guide — end-to-end scenario</h3><div class="muted" style="font-size:12px">ABATS → EDAA pre-sales demonstration · click any step to jump there in role</div></div>
    <button class="iconbtn" data-act="close-modal">${ic('x')}</button></div>
    <div class="mb">${scenes.map((s,i)=>`<div class="scene"><span class="sn">${i+1}</span>
      <div class="sx" style="flex:1"><b>${s[4]}</b> <span class="persona-tag">· ${s[2]} (${s[3]})</span>
        <p>${s[5]}</p><div class="say">${s[6]}</div>
        <div style="margin-top:9px"><button class="btn sm primary" data-act="scene-jump" data-persona="${s[0]}" data-view="${s[1]}">${ic('play')} Jump to this step</button></div>
      </div></div>`).join('')}
      <div class="callout maroon">${ic('shield')}<div><b>Tip</b> — use the persona switcher (top-right) at any time to sign in as a different Entra ID identity. Toggle EN/ع to demonstrate full Arabic + RTL support.</div></div></div>`);
}

/* ================= EVENT DELEGATION ================= */
document.addEventListener('click',e=>{
  const el=e.target.closest('[data-act]');
  const flo=document.getElementById('floatMenu');
  if(flo && !e.target.closest('#floatMenu') && !e.target.closest('#personaBtn') && !e.target.closest('#notifBtn'))closeFloating();
  if(!el)return;
  const a=el.dataset.act;
  switch(a){
    case 'nav': state.view=el.dataset.view; document.getElementById('rail').classList.remove('open'); document.getElementById('railScrim').classList.remove('on'); render(); break;
    case 'lang': state.lang=el.dataset.lang; closeFloating(); render(); break;
    case 'theme': { const cur=document.documentElement.getAttribute('data-theme'); const now=cur==='dark'?'light':cur==='light'?'dark':(window.matchMedia('(prefers-color-scheme: dark)').matches?'light':'dark'); document.documentElement.setAttribute('data-theme',now); break; }
    case 'toggle-rail': document.getElementById('rail').classList.toggle('open'); document.getElementById('railScrim').classList.toggle('on'); break;
    case 'close-rail': document.getElementById('rail').classList.remove('open'); document.getElementById('railScrim').classList.remove('on'); break;
    case 'persona-menu': openPersonaMenu(); break;
    case 'notif': openNotifMenu(); break;
    case 'set-persona': state.personaId=el.dataset.id; state.view='home'; closeFloating(); render(); break;
    case 'presenter': openPresenter(); break;
    case 'close-modal': closeModal(); break;
    case 'scene-jump': state.personaId=el.dataset.persona; state.view=el.dataset.view; closeModal(); render(); break;
    case 'close-panel': closePanel(); break;
    case 'new-emerging': openEmergingForm(); break;
    case 'new-incident': openIncidentForm(); break;
    case 'new-project': openProjectForm(); break;
    case 'new-op': openOpForm(); break;
    case 'open-sub': openSub(el.dataset.module,el.dataset.ref); break;
    case 'open-proj': openProjDetail(el.dataset.ref); break;
    case 'open-op': navigateRiskDetail('op',el.dataset.ref); break;
    case 'open-ent': navigateRiskDetail('ent',el.dataset.ref); break;
    case 'advance-sub': advanceSubStatus(el.dataset.module,el.dataset.ref); break;
    case 'advance-proj': advanceProjStatus(el.dataset.ref); break;
    case 'promote': { const list=el.dataset.module==='incidents'?L02:L01; promoteToEnterprise(list.find(x=>x.ref===el.dataset.ref), el.dataset.module==='incidents'?'Incident':'Emerging Risk'); break; }
    case 'promote-op': promoteToEnterprise(L04.find(x=>x.ref===el.dataset.ref),'Operational Risk'); break;
    case 'run-scan': runDailyScan(); break;
    case 'save-emerging': saveEmerging(); break;
    case 'save-incident': saveIncident(); break;
    case 'save-project': saveProject(); break;
    case 'save-op': saveOp(); break;
    case 'risk-back': state.view = state.riskDetail && state.riskDetail.module==='ent' ? 'entrisk':'oprisk'; render(); break;
    case 'stage-jump': jumpStage(el.dataset.stage); break;
    case 'stage-next': stepStage(1); break;
    case 'stage-prev': stepStage(-1); break;
    case 'toggle-presentation': togglePresentation(); break;
    case 'post-comment': postComment(el.dataset.key); break;
  }
});
document.addEventListener('change',e=>{
  if(e.target.classList.contains('js-calc'))recalcScore();
  if(e.target.dataset.act==='pick-dept'){state.dashDept=e.target.value;render();}
});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closePanel();closeModal();closeFloating();}});
window.addEventListener('resize',closeFloating);

/* ---- save handlers ---- */
function need(id){const v=(document.getElementById(id)||{}).value;return v&&v.trim();}
function saveEmerging(){
  if(!need('f_title')){document.getElementById('f_title').focus();return;}
  const l=+document.getElementById('f_l').value,i=+document.getElementById('f_i').value,s=l*i,b=bandOf(s);
  const ref=`ERR-2026-${String(++SEQ.ERR).padStart(4,'0')}`;
  L01.unshift({ref,title:document.getElementById('f_title').value,desc:document.getElementById('f_desc').value||'—',cat:document.getElementById('f_cat').value,dept:document.getElementById('f_dept').value,l,i,score:s,band:b,by:state.personaId,byName:persona().name,date:fmtDate(TODAY),status:'Submitted'});
  closePanel();
  fireFlow('FLW-01','New emerging risk submitted','مخاطرة ناشئة جديدة',`${ref} created by ${persona().name}. Risk Management notified.`,`${ref} أنشأها ${persona().ar}. تم إشعار إدارة المخاطر.`,'ok');
  if(b==='Critical')fireFlow('FLW-03','Critical risk escalation','تصعيد مخاطرة حرجة',`${ref} scored ${s} (Critical) — immediate escalation to Risk Management.`,`${ref} بدرجة ${s} (حرج) — تصعيد فوري.`,'crit');
  state.view='emerging';render();
}
function saveIncident(){
  if(!need('f_title')){document.getElementById('f_title').focus();return;}
  const sev=document.getElementById('f_sev').value;
  const ref=`INC-2026-${String(++SEQ.INC).padStart(4,'0')}`;
  L02.unshift({ref,title:document.getElementById('f_title').value,desc:document.getElementById('f_desc').value||'—',cat:document.getElementById('f_cat').value,dept:document.getElementById('f_dept').value,sev,occurred:(document.getElementById('f_occ').value||'').replace('T',' ')||fmtDate(TODAY),by:state.personaId,byName:persona().name,date:fmtDate(TODAY),status:'Under Review'});
  closePanel();
  fireFlow('FLW-01','New incident reported','حادثة جديدة',`${ref} reported by ${persona().name}. Risk Management notified.`,`${ref} أبلغ عنها ${persona().ar}.`,'ok');
  if(sev==='Critical')fireFlow('FLW-03','Critical incident escalation','تصعيد حادثة حرجة',`${ref} flagged Critical — immediate escalation to Risk Management.`,`${ref} حرجة — تصعيد فوري.`,'crit');
  state.view='incidents';render();
}
function saveProject(){
  if(!need('f_proj')){document.getElementById('f_proj').focus();return;}
  const ref=`PRA-2026-${String(++SEQ.PRA).padStart(4,'0')}`;
  L03.unshift({ref,project:document.getElementById('f_proj').value,phase:document.getElementById('f_phase').value,reqDate:document.getElementById('f_req').value,desc:document.getElementById('f_desc').value||'—',known:document.getElementById('f_known').value||'—',by:state.personaId,byName:persona().name,date:fmtDate(TODAY),status:'Submitted'});
  closePanel();
  fireFlow('FLW-01','Project assessment requested','طلب تقييم مشروع',`${ref} routed to Risk Management for assessment.`,`${ref} تم توجيهه لإدارة المخاطر.`,'ok');
  state.view='project';render();
}
function saveOp(){
  if(!need('f_desc')){document.getElementById('f_desc').focus();return;}
  const l=+document.getElementById('f_l').value,i=+document.getElementById('f_i').value,s=l*i,b=bandOf(s);
  const dept=document.getElementById('f_dept').value;
  const ref=`ORR-${dept}-${String(++SEQ.ORR)}`;
  L04.unshift({ref,dept,desc:document.getElementById('f_desc').value,cat:document.getElementById('f_cat').value,cause:document.getElementById('f_cause').value||'—',l,i,score:s,band:b,owner:document.getElementById('f_owner').value||persona().name,mit:document.getElementById('f_mit').value||'To be defined.',due:document.getElementById('f_due').value,rl:Math.max(1,l-1),ri:i,rscore:Math.max(1,l-1)*i,rband:bandOf(Math.max(1,l-1)*i),status:'Open',date:fmtDate(TODAY)});
  closePanel();
  fireFlow('FLW-02','Item-level permission assigned','إسناد صلاحية للعنصر',`${ref} — edit rights granted to the ${deptName(dept,'en')} Risk Representative.`,`${ref} — مُنحت صلاحية التعديل لممثل ${deptName(dept,'ar')}.`,'ok');
  if(b==='Critical')fireFlow('FLW-03','Critical band escalation','تصعيد تصنيف حرج',`${ref} scored ${s} (Critical) — escalated to Risk Management.`,`${ref} بدرجة ${s} (حرج).`,'crit');
  state.view='oprisk';render();
}
